<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>app</title>
</head>

<body>
  <div id="root"></div>
  <div id="global-error-display"
    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; background: white; color: red; padding: 20px; display: none; overflow: auto; font-family: monospace; white-space: pre-wrap;">
  </div>
  <script>
    window.addEventListener('error', function (event) {
      var display = document.getElementById('global-error-display');
      if (display) {
        display.style.display = 'block';
        display.innerHTML += 'Global Error: ' + event.message + '\nAt: ' + event.filename + ':' + event.lineno + ':' + event.colno + '\n\n';
      }
    });
    window.addEventListener('unhandledrejection', function (event) {
      var display = document.getElementById('global-error-display');
      if (display) {
        display.style.display = 'block';
        display.innerHTML += 'Unhandled Promise Rejection: ' + event.reason + '\n\n';
      }
    });
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
